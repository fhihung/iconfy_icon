name: iconfy_icon
description: Iconly Pro flat SVG icons for Flutter. Tree-shakeable — only icons you use get bundled.
version: 1.0.0
homepage: https://github.com/user/iconfy_icon

environment:
  sdk: ^3.11.3
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false
